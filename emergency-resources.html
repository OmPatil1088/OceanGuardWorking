<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HazardWatch Dashboard</title>

<style>

/* ===== Basic Layout ===== */

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

.emergency-resources-section{
padding:30px;
}

.resources-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.services-container,
.contact-panel,
.guides-panel,
.emergency-kit-section{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.services-filter{
margin-bottom:10px;
}

.service-filter-btn{
padding:6px 10px;
border:none;
background:#eee;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.service-filter-btn.active{
background:#007bff;
color:white;
}

.service-card{
background:#fafafa;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ddd;
}

.map-btn{
background:#007bff;
border:none;
color:white;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.contact-item{
display:flex;
justify-content:space-between;
padding:6px 0;
}

.guides-container ul{
padding-left:18px;
}

.kit-item{
padding:8px;
background:#f2f2f2;
margin:5px 0;
border-radius:6px;
cursor:pointer;
}

.kit-item.checked{
background:#c8f7c5;
}

.progress-bar-bg{
height:10px;
background:#ddd;
border-radius:6px;
margin:10px 0;
}

.progress-bar-fill{
height:10px;
background:#28a745;
border-radius:6px;
width:0%;
}

</style>

</head>

<body>

<section class="emergency-resources-section" id="emergencyResourcesSection">

<div class="resources-grid">

<div class="services-container">

<div class="section-header">
<h2>Nearby Emergency Services</h2>
<button id="refreshLocationBtn">🔄</button>
</div>

<div id="locationStatus">📍 Detecting location...</div>

<div class="services-filter">
<button class="service-filter-btn active" data-filter="all">All</button>
<button class="service-filter-btn" data-filter="hospitals">🏥 Hospitals</button>
<button class="service-filter-btn" data-filter="police">🚨 Police</button>
<button class="service-filter-btn" data-filter="fire">🚒 Fire</button>
<button class="service-filter-btn" data-filter="ngos">❤️ NGOs</button>
<button class="service-filter-btn" data-filter="shelters">🏠 Shelters</button>
</div>

<div id="servicesList"></div>

</div>


<div class="resources-sidebar">

<div class="contact-panel">

<h3>📞 Emergency Contacts</h3>

<div class="contact-item"><span>Emergency</span><span>112</span></div>
<div class="contact-item"><span>Police</span><span>100</span></div>
<div class="contact-item"><span>Fire</span><span>101</span></div>
<div class="contact-item"><span>Ambulance</span><span>108</span></div>

</div>


<div class="guides-panel">

<h3>🛡 Safety Guides</h3>
<div id="guidesContainer"></div>

</div>

</div>

</div>


<div class="emergency-kit-section">

<h2>Emergency Preparedness Kit</h2>

<div>
<span id="kitPercentage">0%</span>
<div class="progress-bar-bg">
<div class="progress-bar-fill" id="kitProgressBar"></div>
</div>
</div>

<div id="kitChecklist"></div>

<button id="downloadPdfBtn">Download Checklist</button>
<button id="resetKitBtn">Reset</button>

</div>

</section>

<script src="emergency-resources.js"></script>

</body>
</html>
