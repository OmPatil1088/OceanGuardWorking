<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DisasterWatch - Login</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:linear-gradient(120deg,#0ea5e9,#22c55e);
min-height:100vh;
overflow-x:hidden;
}

/* Chat Button */
#chat-toggle{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
border-radius:50%;
border:none;
font-size:26px;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#06b6d4,#3b82f6);
box-shadow:0 10px 25px rgba(0,0,0,.25);
transition:.3s;
z-index:9999;
}

#chat-toggle:hover{
transform:scale(1.1);
}

/* Chat Window */
#chatbox{
position:fixed;
bottom:110px;
right:25px;
width:320px;
height:480px;
display:none;
flex-direction:column;
backdrop-filter:blur(16px);
background:rgba(255,255,255,0.15);
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,.3);
overflow:hidden;
animation:pop .3s ease;
z-index:9999;
}

@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

#header{
padding:15px;
color:white;
font-weight:bold;
background:linear-gradient(135deg,#0284c7,#22c55e);
}

#messages{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
padding:10px 14px;
margin:8px 0;
border-radius:16px;
max-width:75%;
animation:fade .25s ease;
}

.user{
background:#2563eb;
color:white;
margin-left:auto;
}

.bot{
background:white;
color:#111;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{transform:translateY(0)}
}

#input-area{
display:flex;
padding:12px;
background:rgba(255,255,255,0.2);
}

#input{
flex:1;
border:none;
border-radius:12px;
padding:10px;
outline:none;
}

#send{
margin-left:8px;
border:none;
border-radius:12px;
padding:10px 14px;
background:#22c55e;
color:white;
cursor:pointer;
}
</style>
</head>

<body class="login-page">

<div class="login-container">
<div class="login-left">
<div class="hero-content">

<div class="logo">
<h1>DisasterWatch</h1>
</div>

<p class="tagline">
Real-time disaster monitoring and response coordination
</p>

</div>
</div>

<div class="login-right">
<div class="login-form-wrapper">

<h2>Welcome Back</h2>
<p class="subtitle">
Enter your credentials to access the dashboard
</p>

<form id="loginForm" class="login-form">

<div class="form-group">
<label>Username or Email</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" required>
</div>

<button type="submit" class="btn-primary">
Sign In
</button>

</form>

</div>
</div>
</div>

<button id="chat-toggle">💬</button>

<div id="chatbox">

<div id="header">🌊 Disaster Guard</div>

<div id="messages"></div>

<div id="input-area">
<input id="input" placeholder="Ask something...">
<button id="send">Send</button>
</div>

</div>

<script type="module" src="login.js"></script>

<script>

const toggle=document.getElementById("chat-toggle");
const box=document.getElementById("chatbox");
const sendBtn=document.getElementById("send");
const input=document.getElementById("input");
const messages=document.getElementById("messages");

toggle.onclick=()=>{
box.style.display = box.style.display === "flex" ? "none" : "flex";
}

sendBtn.onclick=send;

input.addEventListener("keypress",e=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});

async function send(){

const text=input.value.trim();

if(!text) return;

add(text,"user");

input.value="";

const typing=add("Typing...","bot");

try{

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

if(!res.ok){
throw new Error("Server error");
}

const data=await res.json();

typing.remove();

add(data.reply || "No response from AI","bot");

}catch(error){

typing.remove();

add("⚠ AI service temporarily unavailable","bot");

}

}

function add(text,type){

const msg=document.createElement("div");

msg.className="msg "+type;

msg.innerText=text;

messages.appendChild(msg);

messages.scrollTop=messages.scrollHeight;

return msg;

}

</script>

</body>
</html>
