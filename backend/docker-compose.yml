services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: oceanguard-db
    environment:
      POSTGRES_DB: ${DB_NAME:-oceanguard}
      POSTGRES_USER: ${DB_USER:-oceanguard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8 --encoding=UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oceanguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oceanguard

  # ========================================
  # Redis Cache
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: oceanguard-cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oceanguard

  # ========================================
  # Node.js API Server
  # ========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oceanguard-api
    environment:
      NODE_ENV: development
      PORT: 5000
      FRONTEND_PATH: /frontend
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-oceanguard}
      DB_USER: ${DB_USER:-oceanguard}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../:/frontend:ro
      - /app/node_modules
      - logs:/app/logs
      - uploads:/app/uploads
    command: npm run dev
    networks:
      - oceanguard

  # ========================================
  # pgAdmin (PostgreSQL Management)
  # ========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oceanguard-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oceanguard.gov.in
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - oceanguard

  # ========================================
  # Redis Commander (Redis Management)
  # ========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: oceanguard-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-password}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - oceanguard

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  logs:
    driver: local
  uploads:
    driver: local

networks:
  oceanguard:
    driver: bridge
